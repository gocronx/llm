<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaming 演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .output {
            margin-top: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 10px;
            min-height: 200px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .output.streaming {
            border-left: 4px solid #667eea;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .info {
            margin-top: 20px;
            padding: 15px;
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            border-radius: 5px;
        }
        
        .info h3 {
            color: #1976d2;
            margin-bottom: 10px;
        }
        
        .info p {
            color: #555;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Streaming 演示</h1>
        
        <div class="card">
            <div class="input-group">
                <textarea 
                    id="prompt" 
                    placeholder="输入你的问题...&#10;例如：请介绍一下人工智能的发展历史"
                ></textarea>
            </div>
            
            <button id="sendBtn" onclick="sendRequest()">发送</button>
            
            <div id="output" class="output"></div>
        </div>
        
        <div class="info">
            <h3>💡 Streaming 的价值</h3>
            <p>
                <strong>非流式：</strong>用户需要等待 5-10 秒才能看到完整响应<br>
                <strong>流式：</strong>0.5-1 秒就开始显示，用户感觉更快<br><br>
                <strong>结论：</strong>生产环境必须使用流式输出！
            </p>
        </div>
    </div>

    <script>
        let isStreaming = false;

        async function sendRequest() {
            if (isStreaming) return;
            
            const prompt = document.getElementById('prompt').value.trim();
            if (!prompt) {
                alert('请输入问题');
                return;
            }
            
            const output = document.getElementById('output');
            const sendBtn = document.getElementById('sendBtn');
            
            // 重置输出
            output.textContent = '';
            output.classList.add('streaming');
            
            // 禁用按钮
            sendBtn.disabled = true;
            sendBtn.textContent = '生成中...';
            isStreaming = true;
            
            try {
                console.log('发送请求:', prompt);
                
                const response = await fetch('/stream', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ prompt: prompt })
                });
                
                console.log('响应状态:', response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                
                while (true) {
                    const { done, value } = await reader.read();
                    
                    if (done) {
                        console.log('流结束');
                        break;
                    }
                    
                    buffer += decoder.decode(value, { stream: true });
                    console.log('收到数据块:', buffer);
                    
                    // 处理可能包含多个事件的缓冲区
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); // 保留不完整的行
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.slice(6);
                            console.log('解析数据:', dataStr);
                            
                            try {
                                const data = JSON.parse(dataStr);
                                
                                if (data.content) {
                                    output.textContent += data.content;
                                    // 自动滚动到底部
                                    output.scrollTop = output.scrollHeight;
                                }
                                
                                if (data.done) {
                                    console.log('完成');
                                    break;
                                }
                                
                                if (data.error) {
                                    output.textContent = '错误: ' + data.error;
                                    console.error('错误:', data.error);
                                    break;
                                }
                            } catch (e) {
                                console.error('JSON 解析错误:', e, dataStr);
                            }
                        }
                    }
                }
            } catch (error) {
                console.error('请求失败:', error);
                output.textContent = '请求失败: ' + error.message;
            } finally {
                // 恢复按钮
                sendBtn.disabled = false;
                sendBtn.textContent = '发送';
                isStreaming = false;
                output.classList.remove('streaming');
            }
        }
        
        // 支持 Enter 发送（Shift+Enter 换行）
        document.getElementById('prompt').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendRequest();
            }
        });
    </script>
</body>
</html>
